[unstable]
build-std           = ["core"]
build-std-features  = ["compiler-builtins-mem"]

[build]
target     = "mipsel-sony-psx"
target-dir = "../../../build/examples"

[target.mipsel-sony-psx]
rustflags = [
    # PSX builds cannot recover from panics; immediate abort removes
    # panic formatting and bounds-check reporting code from the binary.
    "-Zunstable-options",
    "-Cpanic=immediate-abort",
    "-Clink-arg=-T../../../sdk/psoxide.ld",
    "-Clink-arg=--oformat=binary",
]
